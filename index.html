<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#7c6aff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alarme Falante">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>⏰ Alarme Falante</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07090f; --surface:#0e1220; --card:#131829;
  --border:rgba(255,255,255,0.08);
  --accent:#7c6aff; --yellow:#ffd93d; --green:#52e07a;
  --red:#ff5e5e; --blue:#4db8ff;
  --text:#f0eeff; --muted:#7a7a9a; --radius:22px;
  --field-bg:rgba(255,255,255,0.05);
  --field-border:rgba(255,255,255,0.1);
  --field-color:#fff; --select-bg:#1a1f35;
}
body.light {
  --bg:#f0f2fa; --surface:#ffffff; --card:#ffffff;
  --border:rgba(0,0,0,0.09); --text:#1a1a2e; --muted:#8888aa;
  --field-bg:rgba(0,0,0,0.04); --field-border:rgba(0,0,0,0.13);
  --field-color:#1a1a2e; --select-bg:#f0f2fa;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px;transition:background .3s,color .3s}

/* NAV */
.nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;transition:background .3s}
.nav-tab{flex:1;padding:13px 4px;background:none;border:none;color:var(--muted);font-family:'Nunito',sans-serif;font-size:0.75rem;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .2s;border-bottom:3px solid transparent}
.nav-tab .ti{font-size:1.25rem}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.theme-btn{padding:13px 10px;background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .2s;flex-shrink:0}
.theme-btn:hover{color:var(--yellow)}

/* PAGES */
.page{display:none;padding:14px}
.page.active{display:block}

/* CLOCK HERO */
.clock-hero{background:var(--card);border:1px solid rgba(124,106,255,0.25);border-radius:var(--radius);padding:18px;text-align:center;margin-bottom:12px;position:relative;overflow:hidden;transition:background .3s}
.clock-hero::after{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;background:radial-gradient(circle,rgba(124,106,255,0.12) 0%,transparent 70%);border-radius:50%;pointer-events:none}
.big-time{font-family:'Fredoka One',cursive;font-size:clamp(3rem,13vw,4.8rem);line-height:1;background:linear-gradient(135deg,var(--text) 20%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.big-date{color:var(--muted);font-size:0.82rem;font-weight:700;margin-top:4px;text-transform:capitalize}

/* ANNOUNCE PANEL */
.ann-panel{background:var(--card);border:1px solid rgba(82,224,122,0.22);border-radius:var(--radius);padding:13px 15px;margin-bottom:12px;transition:background .3s}
.ann-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.ann-title{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--green);display:flex;align-items:center;gap:6px}
.ann-sub{font-size:0.7rem;font-weight:700;color:var(--muted);margin-top:2px}
.ann-intervals{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.ann-intervals.hidden{display:none}
.int-btn{padding:5px 12px;border-radius:16px;background:var(--field-bg);border:1.5px solid var(--field-border);color:var(--muted);font-family:'Nunito',sans-serif;font-size:0.78rem;font-weight:800;cursor:pointer;transition:all .2s}
.int-btn.active{background:rgba(82,224,122,0.15);border-color:var(--green);color:var(--green)}

/* SECTION TITLE */
.sec-title{font-family:'Fredoka One',cursive;font-size:1.05rem;color:var(--yellow);margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;transition:background .3s}

/* TIME PICKER */
.time-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px}
.tcol{display:flex;flex-direction:column;align-items:center;gap:5px}
.tcol label{font-size:0.68rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.t-input{background:var(--field-bg);border:2px solid var(--field-border);border-radius:13px;color:var(--field-color);font-family:'Fredoka One',cursive;font-size:1.9rem;text-align:center;width:80px;padding:8px 4px;outline:none;transition:border-color .2s;-moz-appearance:textfield}
.t-input::-webkit-outer-spin-button,.t-input::-webkit-inner-spin-button{-webkit-appearance:none}
.t-input:focus{border-color:var(--accent)}
.colon{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--accent);margin-top:14px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.arr{background:var(--field-bg);border:1.5px solid var(--field-border);border-radius:10px;color:var(--text);font-size:1rem;width:36px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.arr:hover{background:rgba(124,106,255,0.2);border-color:var(--accent)}
.arr:active{transform:scale(.9)}

/* FIELD */
.field{background:var(--field-bg);border:1.5px solid var(--field-border);border-radius:13px;color:var(--field-color);font-family:'Nunito',sans-serif;font-size:0.93rem;font-weight:700;padding:10px 13px;outline:none;width:100%;transition:border-color .2s,background .3s;margin-bottom:11px}
.field::placeholder{color:var(--muted);opacity:.6}
.field:focus{border-color:var(--accent)}

/* REPEAT */
.rlabel{font-size:0.75rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.rmodes{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:11px}
.rmode{padding:6px 12px;border-radius:18px;background:var(--field-bg);border:1.5px solid var(--field-border);color:var(--muted);font-family:'Nunito',sans-serif;font-size:0.8rem;font-weight:800;cursor:pointer;transition:all .2s}
.rmode.active{background:rgba(124,106,255,0.2);border-color:var(--accent);color:var(--accent)}

/* WEEKDAYS */
.wdays{display:flex;gap:4px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.wd{width:36px;height:36px;border-radius:50%;background:var(--field-bg);border:1.5px solid var(--field-border);color:var(--muted);font-family:'Nunito',sans-serif;font-size:0.75rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.wd.active{background:rgba(82,224,122,0.2);border-color:var(--green);color:var(--green)}

/* DATE ROW */
.drow{display:flex;gap:7px;margin-bottom:11px}
.drow select,.drow input[type=number]{flex:1;background:var(--field-bg);border:1.5px solid var(--field-border);border-radius:11px;color:var(--field-color);font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:700;padding:9px 8px;outline:none;cursor:pointer}
.drow select option{background:var(--select-bg);color:var(--field-color)}

/* ADD BTN */
.btn-add{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),#5b4de0);border:none;border-radius:15px;color:#fff;font-family:'Fredoka One',cursive;font-size:1.2rem;cursor:pointer;transition:all .2s;box-shadow:0 4px 18px rgba(124,106,255,0.3);display:flex;align-items:center;justify-content:center;gap:7px}
.btn-add:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(124,106,255,0.45)}
.btn-add:active{transform:scale(.97)}

/* ALARM ITEMS */
.alarm-item{background:var(--card);border:1px solid var(--border);border-radius:17px;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;gap:10px;transition:all .2s}
.alarm-item.off{opacity:.42}
.a-left{flex:1;min-width:0}
.a-time{font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--green);line-height:1}
.alarm-item.off .a-time{color:var(--muted)}
.a-label{font-size:0.76rem;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.a-repeat{font-size:0.68rem;font-weight:700;color:var(--accent);margin-top:2px}
.a-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.ico-btn{background:var(--field-bg);border:1.5px solid var(--field-border);border-radius:9px;color:var(--muted);font-size:.95rem;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ico-btn.del:hover{background:rgba(255,94,94,0.15);border-color:var(--red);color:var(--red)}
.ico-btn.spk:hover{background:rgba(77,184,255,0.15);border-color:var(--blue);color:var(--blue)}
.toggle{position:relative;width:44px;height:25px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.tslider{position:absolute;cursor:pointer;inset:0;background:rgba(128,128,160,0.25);border-radius:25px;transition:.3s}
.tslider::before{position:absolute;content:'';height:17px;width:17px;left:4px;bottom:4px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,0.3)}
input:checked+.tslider{background:var(--green)}
input:checked+.tslider::before{transform:translateX(19px)}

/* EMPTY */
.empty{text-align:center;color:var(--muted);font-size:.88rem;font-weight:700;padding:22px 0}

/* INSTALL BANNER */
.install-banner{background:linear-gradient(135deg,rgba(124,106,255,0.15),rgba(77,184,255,0.1));border:1px solid rgba(124,106,255,0.3);border-radius:var(--radius);padding:12px 15px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.install-banner.hidden{display:none}
.install-info{flex:1;font-size:0.78rem;font-weight:700;color:var(--text)}
.install-info strong{color:var(--accent);display:block;margin-bottom:2px;font-family:'Fredoka One',cursive;font-size:0.95rem}
.btn-install{padding:8px 14px;background:var(--accent);border:none;border-radius:11px;color:#fff;font-family:'Fredoka One',cursive;font-size:0.9rem;cursor:pointer;white-space:nowrap;transition:all .2s}
.btn-install:hover{background:#6a59e8}
.btn-close-banner{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:2px 4px}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month{font-family:'Fredoka One',cursive;font-size:1.35rem;color:var(--text)}
.cal-nav{background:var(--field-bg);border:1.5px solid var(--field-border);border-radius:9px;color:var(--text);font-size:1rem;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav:hover{background:rgba(124,106,255,0.2);border-color:var(--accent)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{text-align:center;font-size:0.62rem;font-weight:800;color:var(--muted);text-transform:uppercase;padding:5px 0}
.cal-day{aspect-ratio:1;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:0.82rem;font-weight:800;cursor:pointer;position:relative;transition:all .15s;gap:2px;color:var(--text)}
.cal-day:hover{background:var(--field-bg)}
.cal-day.today{background:rgba(124,106,255,0.2);color:var(--accent)}
.cal-day.empty-day{opacity:0;pointer-events:none}
.cal-day-alarms{display:flex;gap:2px;flex-wrap:wrap;justify-content:center}
.cal-dot{width:4px;height:4px;border-radius:50%}
.day-detail{margin-top:12px;background:var(--card);border:1px solid var(--border);border-radius:17px;padding:14px}
.day-detail-title{font-family:'Fredoka One',cursive;font-size:1.05rem;color:var(--yellow);margin-bottom:9px}
.day-alarm-item{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--field-bg);border-radius:11px;margin-bottom:7px}
.day-alarm-time{font-family:'Fredoka One',cursive;font-size:1.35rem;color:var(--green)}
.day-alarm-label{font-size:0.77rem;font-weight:700;color:var(--muted)}
.day-alarm-repeat{font-size:0.67rem;color:var(--accent);font-weight:700}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;z-index:9999;background:#000;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow:hidden}
.overlay.on{display:flex}
.rings{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.ring{position:absolute;border-radius:50%;border:3px solid;opacity:0;animation:ringOut 2.5s ease-out infinite}
.ring:nth-child(1){width:140px;height:140px;border-color:var(--red);animation-delay:0s}
.ring:nth-child(2){width:280px;height:280px;border-color:var(--yellow);animation-delay:.6s}
.ring:nth-child(3){width:430px;height:430px;border-color:var(--green);animation-delay:1.2s}
.ring:nth-child(4){width:580px;height:580px;border-color:var(--blue);animation-delay:1.8s}
@keyframes ringOut{0%{transform:scale(.2);opacity:.9}100%{transform:scale(1);opacity:0}}
.ov-bell{font-size:clamp(3rem,14vw,5.5rem);animation:bellShake .35s ease-in-out infinite;z-index:2;margin-bottom:8px}
@keyframes bellShake{0%,100%{transform:rotate(-14deg)}50%{transform:rotate(14deg)}}
.ov-time{font-family:'Fredoka One',cursive;font-size:clamp(3.8rem,17vw,7rem);line-height:1;background:linear-gradient(135deg,#fff 10%,var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;z-index:2;text-align:center}
.ov-label{font-family:'Fredoka One',cursive;font-size:clamp(1.2rem,5vw,1.9rem);color:#c8c0ff;z-index:2;text-align:center;margin-bottom:32px}
.btn-stop{width:min(300px,86vw);padding:26px 18px;background:linear-gradient(135deg,var(--red),#cc2222);border:none;border-radius:26px;color:#fff;font-family:'Fredoka One',cursive;font-size:clamp(1.6rem,6.5vw,2.5rem);cursor:pointer;z-index:2;box-shadow:0 0 0 6px rgba(255,94,94,.22),0 0 0 14px rgba(255,94,94,.1),0 8px 38px rgba(200,0,0,.5);animation:stopPulse 1s ease-in-out infinite;display:flex;flex-direction:column;align-items:center;gap:4px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.stop-icon{font-size:clamp(1.7rem,8vw,2.8rem)}
@keyframes stopPulse{0%,100%{transform:scale(1);box-shadow:0 0 0 6px rgba(255,94,94,.22),0 0 0 14px rgba(255,94,94,.1),0 8px 38px rgba(200,0,0,.5)}50%{transform:scale(1.05);box-shadow:0 0 0 10px rgba(255,94,94,.28),0 0 0 22px rgba(255,94,94,.1),0 12px 48px rgba(200,0,0,.6)}}
.btn-stop:active{transform:scale(.93)!important;animation:none}
.conf{position:fixed;pointer-events:none;z-index:10000;border-radius:50%;animation:confFall 1.3s ease-in forwards}
@keyframes confFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(250px) rotate(400deg);opacity:0}}
.hidden{display:none!important}
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-tab active" onclick="showPage('alarms')" id="tab-alarms"><span class="ti">⏰</span>Alarmes</button>
  <button class="nav-tab" onclick="showPage('add')" id="tab-add"><span class="ti">➕</span>Novo</button>
  <button class="nav-tab" onclick="showPage('calendar')" id="tab-calendar"><span class="ti">📅</span>Calendário</button>
  <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" title="Tema">🌙</button>
</nav>

<!-- PAGE ALARMES -->
<div class="page active" id="page-alarms">

  <!-- Banner instalação PWA -->
  <div class="install-banner hidden" id="installBanner">
    <div class="install-info">
      <strong>📲 Instalar como App</strong>
      Adicione à tela inicial para usar como aplicativo!
    </div>
    <button class="btn-install" onclick="doInstall()">Instalar</button>
    <button class="btn-close-banner" onclick="closeBanner()">✕</button>
  </div>

  <div class="clock-hero">
    <div class="big-time" id="bigTime">00:00:00</div>
    <div class="big-date" id="bigDate"></div>
  </div>

  <!-- FALAR HORA AUTOMÁTICO -->
  <div class="ann-panel">
    <div class="ann-row">
      <div>
        <div class="ann-title">🗣️ Falar a hora</div>
        <div class="ann-sub" id="annSub">Desativado</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="annToggle" onchange="toggleAnn(this.checked)">
        <span class="tslider"></span>
      </label>
    </div>
    <div class="ann-intervals hidden" id="annIntervalRow">
      <button class="int-btn" data-min="15" onclick="setAnnInterval(15)">15 min</button>
      <button class="int-btn" data-min="30" onclick="setAnnInterval(30)">30 min</button>
      <button class="int-btn active" data-min="60" onclick="setAnnInterval(60)">1 hora</button>
      <button class="int-btn" data-min="120" onclick="setAnnInterval(120)">2 horas</button>
    </div>
  </div>

  <div class="sec-title">🔔 Meus Alarmes</div>
  <div id="alarmList"><div class="empty">Nenhum alarme ainda.<br>Toque em ➕ para adicionar!</div></div>
</div>

<!-- PAGE NOVO ALARME -->
<div class="page" id="page-add">
  <div class="sec-title">➕ Novo Alarme</div>
  <div class="card">
    <div class="time-row">
      <div class="tcol">
        <button class="arr" onclick="chH(1)">▲</button>
        <label>Hora</label>
        <input class="t-input" type="number" id="nHour" value="07" min="0" max="23">
        <button class="arr" onclick="chH(-1)">▼</button>
      </div>
      <div class="colon">:</div>
      <div class="tcol">
        <button class="arr" onclick="chM(1)">▲</button>
        <label>Min</label>
        <input class="t-input" type="number" id="nMin" value="00" min="0" max="59">
        <button class="arr" onclick="chM(-1)">▼</button>
      </div>
    </div>
    <input class="field" type="text" id="nLabel" placeholder="Nome do alarme (ex: Escola 🎒)" maxlength="32">
    <div class="rlabel">Repetir</div>
    <div class="rmodes">
      <button class="rmode active" data-mode="once"    onclick="setMode('once')">Uma vez</button>
      <button class="rmode"        data-mode="daily"   onclick="setMode('daily')">Todo dia</button>
      <button class="rmode"        data-mode="weekdays" onclick="setMode('weekdays')">Dias da semana</button>
      <button class="rmode"        data-mode="weekly"  onclick="setMode('weekly')">Semanal</button>
      <button class="rmode"        data-mode="monthly" onclick="setMode('monthly')">Mensal</button>
    </div>
    <!-- Seletor dias semana -->
    <div id="wdPicker" class="hidden">
      <div class="rlabel">Selecione os dias</div>
      <div class="wdays">
        <button class="wd" data-d="0">Dom</button><button class="wd" data-d="1">Seg</button>
        <button class="wd" data-d="2">Ter</button><button class="wd" data-d="3">Qua</button>
        <button class="wd" data-d="4">Qui</button><button class="wd" data-d="5">Sex</button>
        <button class="wd" data-d="6">Sáb</button>
      </div>
    </div>
    <!-- Data específica -->
    <div id="oncePicker">
      <div class="rlabel">Data</div>
      <div class="drow">
        <input type="number" id="onceDay" class="field" style="margin:0" placeholder="Dia" min="1" max="31">
        <select id="onceMonth" class="field" style="margin:0">
          <option value="0">Janeiro</option><option value="1">Fevereiro</option>
          <option value="2">Março</option><option value="3">Abril</option>
          <option value="4">Maio</option><option value="5">Junho</option>
          <option value="6">Julho</option><option value="7">Agosto</option>
          <option value="8">Setembro</option><option value="9">Outubro</option>
          <option value="10">Novembro</option><option value="11">Dezembro</option>
        </select>
        <input type="number" id="onceYear" class="field" style="margin:0" placeholder="Ano" min="2024" max="2099">
      </div>
    </div>
    <!-- Mensal -->
    <div id="monthlyPicker" class="hidden">
      <div class="rlabel">Dia do mês</div>
      <input type="number" id="monthlyDay" class="field" placeholder="Dia (1-31)" min="1" max="31">
    </div>
    <!-- Semanal -->
    <div id="weeklyPicker" class="hidden">
      <div class="rlabel">Dia da semana</div>
      <div class="wdays" id="weeklyDays">
        <button class="wd" data-d="0">Dom</button><button class="wd" data-d="1">Seg</button>
        <button class="wd" data-d="2">Ter</button><button class="wd" data-d="3">Qua</button>
        <button class="wd" data-d="4">Qui</button><button class="wd" data-d="5">Sex</button>
        <button class="wd" data-d="6">Sáb</button>
      </div>
    </div>
    <button class="btn-add" onclick="addAlarm()">🔔 Salvar Alarme</button>
  </div>
</div>

<!-- PAGE CALENDÁRIO -->
<div class="page" id="page-calendar">
  <div class="card">
    <div class="cal-header">
      <button class="cal-nav" onclick="calMove(-1)">◀</button>
      <div class="cal-month" id="calMonthLabel"></div>
      <button class="cal-nav" onclick="calMove(1)">▶</button>
    </div>
    <div class="cal-grid" id="calDows"></div>
    <div class="cal-grid" id="calDays"></div>
  </div>
  <div class="day-detail hidden" id="dayDetail">
    <div class="day-detail-title" id="dayDetailTitle"></div>
    <div id="dayDetailList"></div>
  </div>
</div>

<!-- OVERLAY ALARME -->
<div class="overlay" id="overlay">
  <div class="rings"><div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div></div>
  <div class="ov-bell">🔔</div>
  <div class="ov-time" id="ovTime">07:00</div>
  <div class="ov-label" id="ovLabel">Hora do alarme!</div>
  <button class="btn-stop" onclick="stopAlarm()">
    <span class="stop-icon">🛑</span>PARAR ALARME
  </button>
</div>

<script>
// ===== ESTADO =====
let alarms       = JSON.parse(localStorage.getItem('alarms3') || '[]');
let selectedMode = 'once';
let selectedWDs  = new Set();
let selWeekDay   = -1;
let calYear, calMonth;
let activeId     = null;
let beepIval=null, speakIval=null, audioCtx=null;
let annActive    = JSON.parse(localStorage.getItem('annActive')   || 'false');
let annInterval  = parseInt(localStorage.getItem('annInterval')   || '60');
let annTimer     = null;
let isDark       = localStorage.getItem('isDark') !== null ? JSON.parse(localStorage.getItem('isDark')) : true;
let deferredPrompt = null;

// ===== PWA INSTALL =====
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if(!localStorage.getItem('bannerClosed')) document.getElementById('installBanner').classList.remove('hidden');
});
window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.add('hidden');
});
async function doInstall(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.add('hidden');
}
function closeBanner(){
  document.getElementById('installBanner').classList.add('hidden');
  localStorage.setItem('bannerClosed','1');
}

// ===== SERVICE WORKER =====
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// ===== NOTIFICAÇÕES =====
function reqNotifPermission(){
  if('Notification' in window && Notification.permission==='default') Notification.requestPermission();
}

// ===== VOZES =====
let voices=[];
function loadV(){ voices=speechSynthesis.getVoices(); }
loadV();
if(speechSynthesis.onvoiceschanged!==undefined) speechSynthesis.onvoiceschanged=loadV;
function getBrV(){ return voices.find(v=>v.lang==='pt-BR')||voices.find(v=>v.lang.startsWith('pt'))||null; }
function speak(txt){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  const v=getBrV(); if(v) u.voice=v;
  u.lang='pt-BR'; u.rate=.88; u.pitch=1.1; u.volume=1;
  speechSynthesis.speak(u);
}

// ===== CONSTANTES =====
const MONTHS=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const DAYS=['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
const DAYS_S=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

// ===== RELÓGIO =====
function tick(){
  const n=new Date();
  const h=pad(n.getHours()),m=pad(n.getMinutes()),s=pad(n.getSeconds());
  document.getElementById('bigTime').textContent=`${h}:${m}:${s}`;
  document.getElementById('bigDate').textContent=`${DAYS[n.getDay()]}, ${n.getDate()} de ${MONTHS[n.getMonth()]} de ${n.getFullYear()}`;
  if(n.getSeconds()===0 && activeId===null) checkAlarms(n);
}
setInterval(tick,500); tick();

// ===== VERIFICAR ALARMES =====
function checkAlarms(now){
  const H=now.getHours(),M=now.getMinutes(),D=now.getDate(),Mo=now.getMonth(),Y=now.getFullYear(),WD=now.getDay();
  for(const a of alarms){
    if(!a.active||a.hour!==H||a.min!==M) continue;
    let fire=false;
    if(a.mode==='daily')            fire=true;
    else if(a.mode==='weekdays')    fire=WD>=1&&WD<=5;
    else if(a.mode==='weekdays_custom') fire=(a.days||[]).includes(WD);
    else if(a.mode==='weekly')      fire=WD===a.weekDay;
    else if(a.mode==='monthly')     fire=D===a.monthDay;
    else if(a.mode==='once')        fire=D===a.date.d&&Mo===a.date.mo&&Y===a.date.y;
    if(fire){ triggerAlarm(a); break; }
  }
}

// ===== DISPARAR ALARME =====
function triggerAlarm(a){
  activeId=a.id;
  const t=`${pad(a.hour)}:${pad(a.min)}`;
  document.getElementById('ovTime').textContent=t;
  document.getElementById('ovLabel').textContent=a.label||'⏰ Hora do alarme!';
  document.getElementById('overlay').classList.add('on');
  document.body.style.overflow='hidden';
  startBeeps();
  const H=a.hour,M=a.min;
  const period=H<12?'da manhã':H<18?'da tarde':'da noite';
  const hTxt=H===0?'meia-noite':H===12?'meio-dia':(H>12?H-12:H)+' horas';
  const mTxt=M===0?'':' e '+(M===1?'um minuto':M+' minutos');
  const msg=`Atenção! São ${hTxt}${mTxt}${H===0||H===12?'':' '+period}! ${a.label?a.label+'!':''}`;
  setTimeout(()=>speak(msg),900);
  speakIval=setInterval(()=>speak(msg),9000);
  if(a.mode==='once'){ a.active=false; save(); }
  // Notificação do sistema (caso app esteja em background)
  if('Notification' in window && Notification.permission==='granted'){
    new Notification('⏰ '+(a.label||'Alarme!'),{body:'São '+t,icon:'./icon-192.png',requireInteraction:true});
  }
}

// ===== PARAR ALARME =====
function stopAlarm(){
  stopBeeps(); speechSynthesis.cancel();
  if(speakIval){clearInterval(speakIval);speakIval=null;}
  document.getElementById('overlay').classList.remove('on');
  document.body.style.overflow='';
  burst(); activeId=null;
  speak('Alarme desativado!');
}

// ===== BEEPS =====
function startBeeps(){ stopBeeps(); beep(); beepIval=setInterval(beep,1500); }
function stopBeeps(){
  if(beepIval){clearInterval(beepIval);beepIval=null;}
  if(audioCtx){try{audioCtx.close();}catch(e){} audioCtx=null;}
}
function beep(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const t=audioCtx.currentTime;
  [880,1100,880,1320].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0,t+i*.12);
    g.gain.linearRampToValueAtTime(.4,t+i*.12+.03);
    g.gain.linearRampToValueAtTime(0,t+i*.12+.1);
    o.start(t+i*.12);o.stop(t+i*.12+.15);
  });
}

// ===== CONFETTI =====
function burst(){
  ['#ff5e5e','#ffd93d','#52e07a','#4db8ff','#ff6eb4','#ffa502'].forEach(c=>{
    for(let i=0;i<5;i++){
      const d=document.createElement('div');
      d.className='conf';
      d.style.cssText=`left:${Math.random()*100}vw;top:${15+Math.random()*60}vh;background:${c};width:10px;height:10px;animation-delay:${Math.random()*.5}s;animation-duration:${.9+Math.random()*.7}s`;
      document.body.appendChild(d);
      d.addEventListener('animationend',()=>d.remove());
    }
  });
}

// ===== TEMA =====
function applyTheme(){
  document.body.classList.toggle('light',!isDark);
  document.getElementById('themeBtn').textContent=isDark?'🌙':'☀️';
  localStorage.setItem('isDark',JSON.stringify(isDark));
}
function toggleTheme(){ isDark=!isDark; applyTheme(); }

// ===== FALAR HORA AUTOMÁTICO =====
function initAnn(){
  document.getElementById('annToggle').checked=annActive;
  document.getElementById('annIntervalRow').classList.toggle('hidden',!annActive);
  updateAnnSub();
  document.querySelectorAll('.int-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.min)===annInterval));
  if(annActive) scheduleAnn();
}
function toggleAnn(on){
  annActive=on; localStorage.setItem('annActive',JSON.stringify(on));
  document.getElementById('annIntervalRow').classList.toggle('hidden',!on);
  updateAnnSub();
  if(on){ scheduleAnn(); speak(`Anúncio de hora ativado. Vou falar a hora a cada ${annInterval<60?annInterval+' minutos':(annInterval/60)+' hora'+(annInterval>60?'s':'')}.`); }
  else { clearTimeout(annTimer); annTimer=null; }
}
function setAnnInterval(min){
  annInterval=min; localStorage.setItem('annInterval',min);
  document.querySelectorAll('.int-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.min)===min));
  updateAnnSub();
  if(annActive){ clearTimeout(annTimer); scheduleAnn(); }
}
function updateAnnSub(){
  const el=document.getElementById('annSub');
  if(!annActive){el.textContent='Desativado';return;}
  el.textContent='✅ A cada '+(annInterval<60?annInterval+' minutos':annInterval/60+' hora'+(annInterval>60?'s':''));
}
function scheduleAnn(){
  clearTimeout(annTimer);
  const ms=annInterval*60*1000;
  const now=new Date();
  const msSinceMidnight=(now.getHours()*60+now.getMinutes())*60000+now.getSeconds()*1000+now.getMilliseconds();
  const next=ms-(msSinceMidnight%ms);
  annTimer=setTimeout(()=>{ doAnnounce(); scheduleAnn(); }, next);
}
function doAnnounce(){
  if(activeId!==null) return;
  const n=new Date(),H=n.getHours(),M=n.getMinutes();
  const period=H<12?'da manhã':H<18?'da tarde':'da noite';
  const hTxt=H===0?'meia-noite':H===12?'meio-dia':(H>12?H-12:H)+' horas';
  const mTxt=M===0?'':' e '+(M===1?'um minuto':M+' minutos');
  speak(`São ${hTxt}${mTxt}${H===0||H===12?'':' '+period}.`);
}

// ===== PÁGINAS =====
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  if(id==='calendar') renderCalendar();
}

// ===== MODO REPETIÇÃO =====
function setMode(m){
  selectedMode=m;
  document.querySelectorAll('.rmode').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
  document.getElementById('wdPicker').classList.toggle('hidden',m!=='weekdays');
  document.getElementById('oncePicker').classList.toggle('hidden',m!=='once');
  document.getElementById('monthlyPicker').classList.toggle('hidden',m!=='monthly');
  document.getElementById('weeklyPicker').classList.toggle('hidden',m!=='weekly');
}
document.querySelectorAll('#wdPicker .wd').forEach(b=>{
  b.addEventListener('click',()=>{
    const d=+b.dataset.d;
    if(selectedWDs.has(d)) selectedWDs.delete(d); else selectedWDs.add(d);
    b.classList.toggle('active',selectedWDs.has(d));
  });
});
document.querySelectorAll('#weeklyDays .wd').forEach(b=>{
  b.addEventListener('click',()=>{
    selWeekDay=+b.dataset.d;
    document.querySelectorAll('#weeklyDays .wd').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
  });
});

// ===== INPUTS HORA =====
function pad(n){return String(n).padStart(2,'0')}
function chH(d){ const el=document.getElementById('nHour'); el.value=pad((parseInt(el.value)+d+24)%24); }
function chM(d){ const el=document.getElementById('nMin');  el.value=pad((parseInt(el.value)+d+60)%60); }
['nHour','nMin'].forEach(id=>{
  document.getElementById(id).addEventListener('input',function(){
    const mx=id==='nHour'?23:59;
    let v=parseInt(this.value)||0;
    if(v>mx)v=mx; if(v<0)v=0;
    this.value=pad(v);
  });
});

// ===== ADICIONAR ALARME =====
function addAlarm(){
  reqNotifPermission();
  const H=parseInt(document.getElementById('nHour').value);
  const M=parseInt(document.getElementById('nMin').value);
  const label=document.getElementById('nLabel').value.trim();
  let alarm={id:Date.now(),hour:H,min:M,label,active:true,mode:selectedMode};
  if(selectedMode==='weekdays'){
    if(selectedWDs.size===0){alert('Selecione pelo menos um dia!');return;}
    alarm.mode='weekdays_custom'; alarm.days=[...selectedWDs];
  } else if(selectedMode==='weekly'){
    if(selWeekDay<0){alert('Selecione o dia da semana!');return;}
    alarm.weekDay=selWeekDay;
  } else if(selectedMode==='monthly'){
    alarm.monthDay=Math.min(Math.max(parseInt(document.getElementById('monthlyDay').value)||1,1),31);
  } else if(selectedMode==='once'){
    alarm.date={d:parseInt(document.getElementById('onceDay').value)||1,mo:parseInt(document.getElementById('onceMonth').value),y:parseInt(document.getElementById('onceYear').value)||new Date().getFullYear()};
  }
  alarms.push(alarm);
  alarms.sort((a,b)=>a.hour*60+a.min-(b.hour*60+b.min));
  save(); renderAlarms();
  speak(`Alarme adicionado para as ${pad(H)}:${pad(M)}. ${label||''}`);
  showPage('alarms');
}

// ===== SALVAR =====
function save(){ localStorage.setItem('alarms3',JSON.stringify(alarms)); }

// ===== LABEL REPETIÇÃO =====
function repeatLabel(a){
  if(a.mode==='daily') return '🔁 Todo dia';
  if(a.mode==='weekdays') return '🔁 Seg a Sex';
  if(a.mode==='weekdays_custom') return '🔁 '+a.days.map(d=>DAYS_S[d]).join(', ');
  if(a.mode==='weekly') return '🔁 Toda '+DAYS_S[a.weekDay||0];
  if(a.mode==='monthly') return `🔁 Todo dia ${a.monthDay}`;
  if(a.mode==='once'&&a.date) return `📅 ${a.date.d}/${a.date.mo+1}/${a.date.y}`;
  return '';
}

// ===== RENDERIZAR ALARMES =====
function renderAlarms(){
  const el=document.getElementById('alarmList');
  if(!alarms.length){el.innerHTML='<div class="empty">Nenhum alarme ainda.<br>Toque em ➕ para adicionar!</div>';return;}
  el.innerHTML=alarms.map(a=>`
    <div class="alarm-item ${a.active?'':'off'}">
      <div class="a-left">
        <div class="a-time">${pad(a.hour)}:${pad(a.min)}</div>
        <div class="a-label">${a.label||'⏰ Alarme'}</div>
        <div class="a-repeat">${repeatLabel(a)}</div>
      </div>
      <div class="a-right">
        <button class="ico-btn spk" onclick="speakAlarm(${a.id})">🔊</button>
        <label class="toggle">
          <input type="checkbox" ${a.active?'checked':''} onchange="toggleA(${a.id},this.checked)">
          <span class="tslider"></span>
        </label>
        <button class="ico-btn del" onclick="delAlarm(${a.id})">🗑️</button>
      </div>
    </div>`).join('');
}
function toggleA(id,v){ const a=alarms.find(x=>x.id===id); if(a){a.active=v;save();renderAlarms();} }
function delAlarm(id){ alarms=alarms.filter(x=>x.id!==id); save(); renderAlarms(); renderCalendar(); }
function speakAlarm(id){ const a=alarms.find(x=>x.id===id); if(!a)return; speak(`Alarme às ${pad(a.hour)}:${pad(a.min)}. ${a.label||''}`); }

// ===== CALENDÁRIO =====
function alarmOccursOn(a,Y,Mo,D){
  const WD=new Date(Y,Mo,D).getDay();
  if(!a.active) return false;
  if(a.mode==='daily') return true;
  if(a.mode==='weekdays') return WD>=1&&WD<=5;
  if(a.mode==='weekdays_custom') return (a.days||[]).includes(WD);
  if(a.mode==='weekly') return WD===a.weekDay;
  if(a.mode==='monthly') return D===a.monthDay;
  if(a.mode==='once'&&a.date) return D===a.date.d&&Mo===a.date.mo&&Y===a.date.y;
  return false;
}
function alarmsForDay(Y,Mo,D){ return alarms.filter(a=>alarmOccursOn(a,Y,Mo,D)); }
function calMove(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;} if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}
function renderCalendar(){
  const lbl=MONTHS[calMonth].charAt(0).toUpperCase()+MONTHS[calMonth].slice(1)+' '+calYear;
  document.getElementById('calMonthLabel').textContent=lbl;
  document.getElementById('calDows').innerHTML=DAYS_S.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const first=new Date(calYear,calMonth,1).getDay();
  const total=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();
  let html='';
  for(let i=0;i<first;i++) html+=`<div class="cal-day empty-day"></div>`;
  for(let d=1;d<=total;d++){
    const as=alarmsForDay(calYear,calMonth,d);
    const isToday=d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear();
    const dots=as.slice(0,4).map(()=>`<div class="cal-dot" style="background:var(--yellow)"></div>`).join('');
    html+=`<div class="cal-day ${isToday?'today':''}" onclick="showDay(${d})"><span>${d}</span><div class="cal-day-alarms">${dots}</div></div>`;
  }
  document.getElementById('calDays').innerHTML=html;
  document.getElementById('dayDetail').classList.add('hidden');
}
function showDay(d){
  const as=alarmsForDay(calYear,calMonth,d);
  const det=document.getElementById('dayDetail');
  det.classList.remove('hidden');
  document.getElementById('dayDetailTitle').textContent=`${d} de ${MONTHS[calMonth]} de ${calYear}`;
  const list=document.getElementById('dayDetailList');
  if(!as.length){list.innerHTML='<div class="empty" style="padding:8px">Nenhum alarme.</div>';return;}
  list.innerHTML=as.map(a=>`
    <div class="day-alarm-item">
      <div>
        <div class="day-alarm-time">${pad(a.hour)}:${pad(a.min)}</div>
        <div class="day-alarm-label">${a.label||'Alarme'}</div>
        <div class="day-alarm-repeat">${repeatLabel(a)}</div>
      </div>
    </div>`).join('');
}

// ===== BOOT =====
const now0=new Date();
calYear=now0.getFullYear(); calMonth=now0.getMonth();
document.getElementById('onceDay').value=now0.getDate();
document.getElementById('onceMonth').value=now0.getMonth();
document.getElementById('onceYear').value=now0.getFullYear();
document.getElementById('monthlyDay').value=now0.getDate();
renderAlarms();
renderCalendar();
applyTheme();
initAnn();
</script>
</body>
</html>
